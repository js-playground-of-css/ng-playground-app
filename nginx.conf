server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        # Cette ligne est la clé : elle essaie de servir le fichier ($uri),
        # puis le dossier ($uri/), et sinon redirige vers index.html
        try_files $uri $uri/ /index.html;
    }

    # Optionnel : Gestion du cache pour les fichiers statiques
    location ~* \.(?:ico|css|js|gif|jpe?g|png)$ {
        expires 30d;
        add_header Pragma public;
        add_header Cache-Control "public";
    }
}